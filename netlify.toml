[build]
  command = "npm run build"
  # Do NOT set publish — @netlify/plugin-nextjs manages output

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "public, s-maxage=300, stale-while-revalidate=600"
