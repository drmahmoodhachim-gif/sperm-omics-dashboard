name: Scheduled Data Ingestion

on:
  schedule:
    # Every Sunday at 03:00 UTC
    - cron: "0 3 * * 0"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Run full ingestion pipeline
        run: npm run ingest
        env:
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}

      - name: Commit updated library data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: weekly omics library ingest"
          git push || echo "Nothing to push or push failed"
